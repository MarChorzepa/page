<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Moje Przestrzenie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ base_path }}css/style.css">
    <script src="{{ base_path }}js/main.js" defer></script>
</head>
<body data-sound-path="{{ base_path }}audio/awp.mp3">
    <div class="bg-container" id="bgContainer" data-images='{{ images_json }}'></div>

    <nav class="nav-bar" id="navBar">
        <div class="nav-inner">
            <a href="{{ base_path }}index.html" class="nav-brand">Moje Przestrzenie</a>
            <div class="nav-links" id="navLinks">
                <a href="{{ base_path }}galeria.html" class="nav-link">Galeria</a>
                <a href="{{ base_path }}teksty.html" class="nav-link">Teksty</a>
                <a href="{{ base_path }}notatki.html" class="nav-link">Notatki</a>
                <a href="{{ base_path }}memy.html" class="nav-link">Memy</a>
                <a href="{{ base_path }}losowe.html" class="nav-link">Losowe</a>
            </div>
            <button class="nav-anchor-btn" id="navAnchorBtn" title="Przypnij/odłącz pasek nawigacji" aria-label="Przełącz przypięcie nawigacji">
                <svg id="anchorIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="5" r="3"/>
                    <line x1="12" y1="22" x2="12" y2="8"/>
                    <path d="M5 12H2a10 10 0 0 0 20 0h-3"/>
                </svg>
            </button>
            <button class="nav-toggle" id="navToggle" aria-label="Przełącz menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{{ content | safe }}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>Moje Przestrzenie — prywatne przedsięwzięcia, teksty, projekty i memy.</p>
    </footer>
</body>
</html>
